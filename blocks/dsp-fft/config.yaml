# Design Definition
DESIGN_NAME: "fft" # Replace with your exact top module name
VERILOG_FILES: "dir::src/fft.sv" # Your pre-synthesis structural netlist or RTL
SDC_FILE: "dir::src/my_constraints.sdc"

# PDK Configuration
PDK: "gf180mcuD"
STD_CELL_LIBRARY: "gf180mcu_fd_sc_mcu9t5v0"

# 1. Floorplanning (Fixing your 1.5mm x 1.5mm square footprint)
FP_SIZING: "absolute"
DIE_AREA: [0, 0, 1500, 1500]
CORE_AREA: [15, 15, 1485, 1485]

# 2. Timing Repair & Hold Fix Tuning (Solving your -0.09ns setup/hold issues)
# This forces LibreLane to aggressively size cells and inject buffers with safe guard-bands
PL_TARGET_DENSITY: 0.40
DRC_EXCLUDE_CELL_LIST: [] 

# We tell LibreLane to leave a strict 50ps setup/hold margin during placement repairs
# and a 20ps margin during the critical post-routing phase
REPAIR_TIMING_SETUP_MARGIN: 0.05
REPAIR_TIMING_HOLD_MARGIN: 0.05
QUIT_ON_HOLD_VIOLATIONS: true
QUIT_ON_SETUP_VIOLATIONS: false

# 3. Clock Tree Synthesis (CTS) Configurations
CTS_ROOT_BUFFER: "gf180mcu_fd_sc_mcu9t5v0__clkbuf_8"
CTS_CLK_BUFFERS:
  - "gf180mcu_fd_sc_mcu9t5v0__clkbuf_2"
  - "gf180mcu_fd_sc_mcu9t5v0__clkbuf_4"
  - "gf180mcu_fd_sc_mcu9t5v0__clkbuf_8"
